<mt:If tag="EntryDataEyecatch">
    <mt:SetVarBlock name="image_url"><mt:EntryDataEyecatchAsset><mt:AssetThumbnailURL width="768" /></mt:EntryDataEyecatchAsset></mt:SetVarBlock>
<mt:Else>
    <mt:SetVarBlock name="image_url"><mt:Var name="website_url" />_assets/img/share/noimage.png</mt:SetVarBlock>
</mt:If>
<li class="item">
    <a href="<mt:EntryPermalink escape="html" />">
        <div class="item__photo"><img src="<mt:Var name="image_url" />" alt="<mt:EntryTitle escape="html" /> 画像"></div>
        <div class="item__info">
            <div class="item__cat">
<mt:EntryCategories>
                <span><mt:CategoryLabel /></span>
</mt:EntryCategories>
            </div>
            <p class="item__date"><mt:EntryDate format="%Y.%b.%e" strip="" /></p>
            <p class="item__title"><mt:EntryTitle /></p>
        </div>
    </a>
</li>

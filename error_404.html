<mt:Unless name="compress" regex_replace="/^\s*\n/gm","">
<mt:Include module="_config" />
<mt:SetVar name="page_vars" note="init" />
<mt:SetVarBlock name="page_vars{title}">404 Not Found. | <mt:Var name="website_name" /></mt:SetVarBlock>
<mt:SetVarBlock name="page_vars{description}"><mt:Var name="website_description" /></mt:SetVarBlock>
<mt:SetVarBlock name="page_vars{canonical_url}"><mt:CanonicalURL /></mt:SetVarBlock>
<mt:SetVar name="page_css" note="init" />
<mt:SetVarBlock name="page_css" function="push"></mt:SetVarBlock>
<mt:SetVar name="page_vars{css}" value="$page_css" />
<mt:SetVar name="page_js" note="init" />
<mt:SetVarBlock name="page_js" function="push"></mt:SetVarBlock>
<mt:SetVar name="page_vars{js}" value="$page_js" />
<mt:SetVarBlock name="page_vars{header_area}"></mt:SetVarBlock>

<mt:Include module="_header" my_page_vars="$page_vars" />

<p>404 Not Found.</p>
<h1>ページが見つかりません。</h1>
<p><a href="<mt:Var name="website_url" escape="html" />">トップページへ</a></p>

<mt:Include module="_footer" my_page_vars="$page_vars" />
</mt:Unless>
